<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thompson Gains Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #f0f0f0; font-family: 'DM Sans', system-ui, sans-serif; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
  .day-tab:hover { opacity: 0.85; }
  .ex-row:hover { background: rgba(255,255,255,0.02) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const DAYS = [
  {
    id: "monday", label: "Monday", focus: "Upper — Push", subtitle: "Chest, Shoulders, Tris",
    color: "#ff6b35", equipment: "🏋️ Barbell on Rack", equipColor: "#ff6b35",
    sections: [
      { title: "Superset 1 — Chest Power", exercises: [
        { id: "bench", name: "Barbell Bench Press", sets: 4, reps: "8–10" },
        { id: "incline", name: "Dumbbell Incline Press", sets: 4, reps: "10–12" },
      ]},
      { title: "Superset 2 — Shoulders", exercises: [
        { id: "ohpress", name: "Dumbbell Shoulder Press", sets: 3, reps: "10–12" },
        { id: "lateral", name: "Dumbbell Lateral Raise", sets: 3, reps: "15" },
      ]},
      { title: "Superset 3 — Triceps", exercises: [
        { id: "skull", name: "Skull Crushers (Barbell)", sets: 3, reps: "12" },
        { id: "triext", name: "Tricep OH Extension (DB)", sets: 3, reps: "12" },
      ]},
      { title: "⚡ Ab Finisher", isFinisher: true, exercises: [
        { id: "plank_mon", name: "Plank", sets: 3, reps: "40s" },
        { id: "kbtwist_mon", name: "KB Russian Twist", sets: 3, reps: "20" },
      ]},
    ],
  },
  {
    id: "tuesday", label: "Tuesday", focus: "Lower — Quad & Knee", subtitle: "Knee Rebuild Day",
    color: "#47ffb0", equipment: "⚙️ Plates on Cable", equipColor: "#47b8ff",
    sections: [
      { title: "Superset 1 — Quad + Knee Stability", exercises: [
        { id: "legext", name: "Short Arc Leg Extension", sets: 4, reps: "15", kneeSafe: true },
        { id: "tke", name: "Terminal Knee Extension (Cable)", sets: 4, reps: "15 ea.", kneeSafe: true },
      ]},
      { title: "Superset 2 — Hamstrings", exercises: [
        { id: "legcurl_tue", name: "Leg Curl (FEIERDUN)", sets: 4, reps: "12–15" },
        { id: "rdl_tue", name: "Romanian Deadlift (DB)", sets: 4, reps: "10–12" },
      ]},
      { title: "Superset 3 — Glutes + Hips", exercises: [
        { id: "pullthrough", name: "Cable Pull-Through", sets: 3, reps: "12", kneeSafe: true },
        { id: "clam", name: "Clamshells (BW)", sets: 3, reps: "20 ea.", kneeSafe: true },
      ]},
      { title: "⚡ Ab Finisher", isFinisher: true, exercises: [
        { id: "deadbug_tue", name: "Dead Bug", sets: 3, reps: "10 ea." },
        { id: "kbtwist_tue", name: "KB Russian Twist", sets: 3, reps: "20" },
      ]},
    ],
  },
  {
    id: "wednesday", label: "Wednesday", focus: "Upper — Pull", subtitle: "Back & Biceps",
    color: "#47b8ff", equipment: "⚙️ Plates on Cable", equipColor: "#47b8ff",
    sections: [
      { title: "Superset 1 — Back Width", exercises: [
        { id: "pulldown", name: "Cable Lat Pulldown", sets: 4, reps: "10–12" },
        { id: "sarow", name: "Single Arm DB Row", sets: 4, reps: "10–12 ea." },
      ]},
      { title: "Superset 2 — Back Thickness", exercises: [
        { id: "cablerow", name: "Cable Seated Row", sets: 4, reps: "10–12" },
        { id: "reardelt", name: "Dumbbell Rear Delt Fly", sets: 3, reps: "15" },
      ]},
      { title: "Superset 3 — Bicep Size", exercises: [
        { id: "dbcurl", name: "Dumbbell Curl", sets: 3, reps: "12" },
        { id: "hammercurl", name: "Cable Hammer Curl", sets: 3, reps: "12" },
      ]},
      { title: "⚡ Ab Finisher", isFinisher: true, exercises: [
        { id: "plank_wed", name: "Plank", sets: 3, reps: "40s" },
        { id: "deadbug_wed", name: "Dead Bug", sets: 3, reps: "10 ea." },
      ]},
    ],
  },
  {
    id: "thursday", label: "Thursday", focus: "Lower — Glutes & Hams", subtitle: "Legs in Shorts Day",
    color: "#c47aff", equipment: "💪 Dumbbells + FEIERDUN", equipColor: "#c47aff",
    sections: [
      { title: "Superset 1 — Glute Mass", exercises: [
        { id: "hipthrust", name: "Dumbbell Hip Thrust", sets: 4, reps: "12" },
        { id: "sumo", name: "Sumo Squat (DB, shallow)", sets: 4, reps: "12", kneeSafe: true },
      ]},
      { title: "Superset 2 — Hamstring Strength", exercises: [
        { id: "legcurl_thu", name: "Leg Curl (FEIERDUN)", sets: 4, reps: "12–15" },
        { id: "kbswing_thu", name: "KB Swing", sets: 4, reps: "15" },
      ]},
      { title: "Superset 3 — Calf Aesthetics", exercises: [
        { id: "calfraise", name: "Standing Calf Raise (DB)", sets: 4, reps: "20" },
        { id: "slcalf", name: "Single Leg Calf Raise (BW)", sets: 4, reps: "15 ea." },
      ]},
      { title: "⚡ Ab Finisher", isFinisher: true, exercises: [
        { id: "kbtwist_thu", name: "KB Russian Twist", sets: 3, reps: "20" },
        { id: "plank_thu", name: "Plank", sets: 3, reps: "40s" },
      ]},
    ],
  },
  {
    id: "saturday", label: "Saturday", focus: "Full Body — KB Sweat", subtitle: "Conditioning + Strength",
    color: "#ff47a8", equipment: "🔔 Kettlebell Only", equipColor: "#ff47a8",
    sections: [
      { title: "Circuit 1 — Full Body Primer (2 Rounds)", exercises: [
        { id: "kbdl", name: "KB Deadlift", sets: 2, reps: "15" },
        { id: "kbgoblet", name: "KB Goblet Squat (shallow)", sets: 2, reps: "12", kneeSafe: true },
        { id: "kbhalo", name: "KB Halo", sets: 2, reps: "10 each way" },
      ]},
      { title: "Circuit 2 — Conditioning Burner (3 Rounds)", exercises: [
        { id: "kbswing_sat", name: "KB Swing", sets: 3, reps: "20" },
        { id: "kbclean", name: "KB Clean & Press", sets: 3, reps: "8 ea." },
        { id: "kbrow", name: "KB Bent Over Row", sets: 3, reps: "10 ea." },
      ]},
      { title: "Circuit 3 — Strength Finisher (3 Rounds)", exercises: [
        { id: "kbslrdl", name: "KB Single Leg RDL", sets: 3, reps: "10 ea.", kneeSafe: true },
        { id: "kbfloor", name: "KB Floor Press", sets: 3, reps: "12" },
        { id: "kbcarry", name: "KB Suitcase Carry", sets: 3, reps: "20 steps ea." },
      ]},
      { title: "⚡ Ab Finisher", isFinisher: true, exercises: [
        { id: "kbtwist_sat", name: "KB Russian Twist", sets: 3, reps: "20" },
        { id: "kbwindmill", name: "KB Windmill", sets: 3, reps: "8 ea." },
      ]},
    ],
  },
];

const STORAGE_KEY = "thompson-gains-tracker";

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function SetButton({ checked, onClick, color }) {
  return (
    <button onClick={onClick} style={{
      width: 34, height: 34, borderRadius: 6,
      border: checked ? `2px solid ${color}` : "2px solid #333",
      background: checked ? color : "transparent",
      cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
      transition: "all 0.15s ease", flexShrink: 0,
    }}>
      {checked && (
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7l3.5 3.5L12 3" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
    </button>
  );
}

function WeightInput({ value, onChange, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <input type="number" value={value} onChange={e => onChange(e.target.value)} placeholder="lbs"
        style={{
          width: 64, padding: "5px 8px", background: "#1a1a1a",
          border: "1px solid #333", borderRadius: 6, color: "#fff",
          fontSize: 13, fontFamily: "inherit", outline: "none", textAlign: "center",
        }}
        onFocus={e => e.target.style.borderColor = color}
        onBlur={e => e.target.style.borderColor = "#333"}
      />
      <span style={{ fontSize: 11, color: "#555" }}>lbs</span>
    </div>
  );
}

function App() {
  const [activeDay, setActiveDay] = useState("monday");
  const [data, setData] = useState(() => load());
  const [showComplete, setShowComplete] = useState(false);
  const [historyView, setHistoryView] = useState(false);

  const update = (newData) => { setData(newData); save(newData); };

  const toggleSet = (exId, setIdx) => {
    const key = `${activeDay}-${exId}-s${setIdx}`;
    const logs = { ...(data.logs || {}), [key]: !data.logs?.[key] };
    update({ ...data, logs });
  };

  const setWeight = (exId, val) => {
    const key = `${activeDay}-${exId}-w`;
    const weights = { ...(data.weights || {}), [key]: val };
    update({ ...data, weights });
  };

  const setNote = (exId, val) => {
    const key = `${activeDay}-${exId}-n`;
    const notes = { ...(data.notes || {}), [key]: val };
    update({ ...data, notes });
  };

  const getWeight = (exId) => data.weights?.[`${activeDay}-${exId}-w`] || "";
  const getNote = (exId) => data.notes?.[`${activeDay}-${exId}-n`] || "";
  const isSetDone = (exId, setIdx) => !!data.logs?.[`${activeDay}-${exId}-s${setIdx}`];
  const getExDone = (exId, sets) => { let d=0; for(let i=0;i<sets;i++) if(isSetDone(exId,i)) d++; return d; };

  const getDayProgress = (dayId) => {
    const day = DAYS.find(d => d.id === dayId);
    if (!day) return { done: 0, total: 0 };
    let done = 0, total = 0;
    day.sections.forEach(s => s.exercises.forEach(ex => {
      for (let i = 0; i < ex.sets; i++) {
        total++;
        if (data.logs?.[`${dayId}-${ex.id}-s${i}`]) done++;
      }
    }));
    return { done, total };
  };

  const currentDay = DAYS.find(d => d.id === activeDay);
  const { done: totalDone, total: totalSets } = getDayProgress(activeDay);
  const pct = totalSets > 0 ? Math.round((totalDone / totalSets) * 100) : 0;
  const history = data.history || [];

  const completeWorkout = () => {
    const entry = {
      date: new Date().toLocaleDateString(),
      day: activeDay,
      label: currentDay.label,
      focus: currentDay.focus,
      setsCompleted: totalDone,
      totalSets,
      exercises: currentDay.sections.flatMap(s => s.exercises.map(ex => ({
        name: ex.name,
        weight: getWeight(ex.id),
        setsCompleted: getExDone(ex.id, ex.sets),
        totalSets: ex.sets,
      }))),
    };
    update({ ...data, history: [entry, ...history].slice(0, 30) });
    setShowComplete(true);
    setTimeout(() => setShowComplete(false), 2500);
  };

  const clearDay = () => {
    const logs = { ...(data.logs || {}) };
    currentDay.sections.forEach(s => s.exercises.forEach(ex => {
      for (let i = 0; i < ex.sets; i++) delete logs[`${activeDay}-${ex.id}-s${i}`];
    }));
    update({ ...data, logs });
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a0a", color: "#f0f0f0", fontFamily: "'DM Sans', system-ui, sans-serif", paddingBottom: 80 }}>

      {/* Header */}
      <div style={{ background: "#111", borderBottom: "1px solid #1e1e1e", padding: "20px 16px 0" }}>
        <div style={{ maxWidth: 700, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
            <div>
              <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 38, letterSpacing: 3, color: "#e8ff47", lineHeight: 1 }}>
                THOMPSON GAINS
              </div>
              <div style={{ fontSize: 11, color: "#555", letterSpacing: 2, textTransform: "uppercase", marginTop: 3 }}>
                5-Day Tracker · 30 min + Sauna · Data saves locally
              </div>
            </div>
            <button onClick={() => setHistoryView(!historyView)} style={{
              background: historyView ? "#e8ff47" : "#1a1a1a", border: "1px solid #2a2a2a",
              color: historyView ? "#000" : "#888", padding: "8px 16px", borderRadius: 6,
              cursor: "pointer", fontSize: 12, fontFamily: "inherit", fontWeight: 600, letterSpacing: 1,
            }}>
              {historyView ? "← BACK" : "HISTORY"}
            </button>
          </div>

          {!historyView && (
            <div style={{ display: "flex", gap: 3, overflowX: "auto", paddingBottom: 0 }}>
              {DAYS.map(day => {
                const { done, total } = getDayProgress(day.id);
                const isActive = activeDay === day.id;
                return (
                  <button key={day.id} className="day-tab" onClick={() => setActiveDay(day.id)} style={{
                    background: isActive ? day.color : "transparent",
                    border: `2px solid ${isActive ? day.color : "#2a2a2a"}`,
                    color: isActive ? "#000" : "#777",
                    padding: "10px 14px", borderRadius: "6px 6px 0 0",
                    cursor: "pointer", fontFamily: "'Bebas Neue', sans-serif",
                    fontSize: 15, letterSpacing: 1, whiteSpace: "nowrap",
                    transition: "all 0.15s", position: "relative",
                  }}>
                    {day.label}
                    {done > 0 && (
                      <span style={{
                        position: "absolute", top: -7, right: -7, width: 17, height: 17,
                        background: done === total ? "#47ffb0" : day.color,
                        borderRadius: "50%", fontSize: 9,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        color: "#000", fontFamily: "sans-serif", fontWeight: 700,
                      }}>
                        {done === total ? "✓" : done}
                      </span>
                    )}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* History */}
      {historyView ? (
        <div style={{ maxWidth: 700, margin: "24px auto", padding: "0 16px", animation: "fadeIn 0.3s ease" }}>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: "#e8ff47", letterSpacing: 2, marginBottom: 16 }}>
            WORKOUT HISTORY
          </div>
          {history.length === 0 ? (
            <div style={{ textAlign: "center", color: "#444", padding: 48, fontSize: 14 }}>
              No workouts logged yet. Complete a session to see it here!
            </div>
          ) : history.map((entry, i) => {
            const day = DAYS.find(d => d.id === entry.day);
            return (
              <div key={i} style={{
                background: "#141414", border: "1px solid #222", borderRadius: 10,
                padding: 18, marginBottom: 12, borderLeft: `4px solid ${day?.color || "#444"}`,
                animation: "fadeIn 0.3s ease",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: day?.color || "#fff", letterSpacing: 1 }}>
                      {entry.label} — {entry.focus}
                    </div>
                    <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>{entry.date}</div>
                  </div>
                  <div style={{
                    background: "rgba(232,255,71,0.1)", border: "1px solid rgba(232,255,71,0.2)",
                    padding: "4px 10px", borderRadius: 4, fontSize: 12, color: "#e8ff47", fontWeight: 600,
                  }}>
                    {entry.setsCompleted}/{entry.totalSets} sets
                  </div>
                </div>
                <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 4 }}>
                  {entry.exercises?.filter(ex => ex.weight || ex.setsCompleted > 0).map((ex, j) => (
                    <div key={j} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#666" }}>
                      <span>{ex.name}</span>
                      <span>
                        {ex.setsCompleted}/{ex.totalSets} sets
                        {ex.weight ? <span style={{ color: day?.color, marginLeft: 8 }}>{ex.weight} lbs</span> : ""}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "20px 16px", animation: "fadeIn 0.3s ease" }}>

          {/* Day Card */}
          <div style={{
            background: "#141414", border: "1px solid #222", borderRadius: 12,
            padding: 20, marginBottom: 16, borderTop: `3px solid ${currentDay.color}`,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, color: currentDay.color, letterSpacing: 2, lineHeight: 1 }}>
                  {currentDay.focus}
                </div>
                <div style={{ fontSize: 13, color: "#666", marginTop: 4 }}>{currentDay.subtitle}</div>
                <div style={{
                  display: "inline-block", fontSize: 11, padding: "3px 10px", borderRadius: 4, marginTop: 8,
                  background: `${currentDay.equipColor}18`, color: currentDay.equipColor,
                  border: `1px solid ${currentDay.equipColor}44`, fontWeight: 600, letterSpacing: 1,
                }}>
                  {currentDay.equipment}
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 42, color: pct === 100 ? "#47ffb0" : currentDay.color, lineHeight: 1 }}>
                  {pct}%
                </div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{totalDone} / {totalSets} SETS</div>
              </div>
            </div>

            <div style={{ marginTop: 16, background: "#1e1e1e", height: 6, borderRadius: 3, overflow: "hidden" }}>
              <div style={{
                height: "100%", borderRadius: 3,
                background: pct === 100 ? "#47ffb0" : currentDay.color,
                width: `${pct}%`, transition: "width 0.4s ease",
              }} />
            </div>

            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button onClick={completeWorkout} style={{
                flex: 1, padding: "11px 0", borderRadius: 8,
                background: pct === 100 ? "#47ffb0" : `${currentDay.color}22`,
                border: `1px solid ${pct === 100 ? "#47ffb0" : currentDay.color}`,
                color: pct === 100 ? "#000" : currentDay.color,
                fontFamily: "inherit", fontWeight: 600, fontSize: 13,
                cursor: "pointer", letterSpacing: 1, transition: "all 0.2s",
                animation: showComplete ? "pop 0.3s ease" : "none",
              }}>
                {showComplete ? "✓ WORKOUT LOGGED!" : pct === 100 ? "✅ COMPLETE WORKOUT" : "LOG WORKOUT"}
              </button>
              <button onClick={clearDay} style={{
                padding: "11px 16px", borderRadius: 8, background: "transparent",
                border: "1px solid #2a2a2a", color: "#555",
                fontFamily: "inherit", fontSize: 12, cursor: "pointer", letterSpacing: 1,
              }}>
                RESET
              </button>
            </div>
          </div>

          {/* Exercise Sections */}
          {currentDay.sections.map((section, si) => (
            <div key={si} style={{
              background: section.isFinisher ? "rgba(232,255,71,0.03)" : "#141414",
              border: section.isFinisher ? "1px solid rgba(232,255,71,0.15)" : "1px solid #1e1e1e",
              borderRadius: 10, marginBottom: 12, overflow: "hidden",
            }}>
              <div style={{
                padding: "12px 16px", borderBottom: "1px solid #1a1a1a",
                fontSize: 11, textTransform: "uppercase", letterSpacing: 2, fontWeight: 600,
                color: section.isFinisher ? "#e8ff47" : "#555",
              }}>
                {section.title}
              </div>

              {section.exercises.map((ex, ei) => {
                const exDone = getExDone(ex.id, ex.sets);
                const allDone = exDone === ex.sets;
                return (
                  <div key={ei} className="ex-row" style={{
                    padding: "14px 16px",
                    borderBottom: ei < section.exercises.length - 1 ? "1px solid #1a1a1a" : "none",
                    transition: "background 0.15s",
                    background: allDone ? `${currentDay.color}08` : "transparent",
                  }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 10 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{
                          fontSize: 14, fontWeight: 500,
                          color: allDone ? currentDay.color : "#e0e0e0",
                          display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap",
                        }}>
                          {ex.name}
                          {ex.kneeSafe && (
                            <span style={{
                              fontSize: 9, background: "rgba(71,255,176,0.12)", color: "#47ffb0",
                              border: "1px solid rgba(71,255,176,0.3)", padding: "1px 6px",
                              borderRadius: 3, letterSpacing: 1, fontWeight: 700,
                            }}>KNEE SAFE</span>
                          )}
                        </div>
                        <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>
                          {ex.sets} sets × {ex.reps} · {exDone}/{ex.sets} done
                        </div>
                      </div>
                      <WeightInput value={getWeight(ex.id)} onChange={v => setWeight(ex.id, v)} color={currentDay.color} />
                    </div>

                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                      {Array.from({ length: ex.sets }).map((_, si2) => (
                        <SetButton key={si2} checked={isSetDone(ex.id, si2)} onClick={() => toggleSet(ex.id, si2)} color={currentDay.color} />
                      ))}
                    </div>

                    <input
                      value={getNote(ex.id)}
                      onChange={e => setNote(ex.id, e.target.value)}
                      placeholder="Add note (e.g. felt strong, go heavier next week)..."
                      style={{
                        width: "100%", background: "#0f0f0f", border: "1px solid #222",
                        borderRadius: 6, padding: "6px 10px", color: "#888",
                        fontSize: 12, fontFamily: "inherit", outline: "none",
                      }}
                      onFocus={e => e.target.style.borderColor = currentDay.color}
                      onBlur={e => e.target.style.borderColor = "#222"}
                    />
                  </div>
                );
              })}
            </div>
          ))}

          {/* Sauna Reminder */}
          <div style={{
            background: "linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,107,53,0.03))",
            border: "1px solid rgba(255,107,53,0.2)", borderRadius: 10, padding: 16,
            display: "flex", alignItems: "center", gap: 12,
          }}>
            <span style={{ fontSize: 28 }}>🔥</span>
            <div>
              <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: "#ff6b35", letterSpacing: 2 }}>
                15 MIN SAUNA AFTER
              </div>
              <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>
                Drink 16oz water first · Reduces knee inflammation · Boosts recovery
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
